<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=393, height=852, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 393px;
      height: 852px;
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1c1c1e;
      display: flex;
      flex-direction: column;
      padding: 60px 32px 40px 32px;
      position: relative;
      overflow: hidden;
    }

    /* Status Bar simulation */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 54px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      font-size: 15px;
      font-weight: 600;
      z-index: 100;
    }

    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 35px;
      background: black;
      border-radius: 20px;
    }

    /* Header */
    .header {
      margin-top: 40px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #1c1c1e, #3a3a3c);
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 32px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
    }

    .title {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: #8e8e93;
      font-weight: 400;
      letter-spacing: -0.2px;
      line-height: 1.4;
      max-width: 240px;
    }

    /* Massive Data Anchor */
    .metrics-container {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .huge-number {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 140px;
      font-weight: 700;
      letter-spacing: -8px;
      line-height: 1;
      color: #000;
    }

    .number-label {
      font-size: 15px;
      font-weight: 500;
      color: #aeaeb2;
      margin-top: -10px;
      margin-left: 8px;
    }

    /* Floating Action Bar */
    .fab-container {
      padding-bottom: 24px;
    }

    .fab {
      width: 100%;
      height: 72px;
      background: rgba(242, 242, 247, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px 0 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06), inset 0 1px 1px rgba(255, 255, 255, 0.7);
    }

    .fab-text {
      font-size: 17px;
      font-weight: 600;
      color: #1c1c1e;
    }

    .fab-arrow {
      width: 48px;
      height: 48px;
      background: #1c1c1e;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    /* Additional visual anchors */
    .grid-lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(to right, rgba(0, 0, 0, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      z-index: -1;
    }
  </style>
</head>

<body>
  <div class="grid-lines"></div>

  <div class="status-bar">
    <span>16:50</span>
    <div class="dynamic-island"></div>
    <span style="font-size: 13px;">􀙡 􀙇 􀛨</span>
  </div>

  <div class="header">
    <div class="logo">􀙮</div>
    <div class="title">足迹地图</div>
    <div class="subtitle">基于本地相册的无感旅行轨迹记录</div>
  </div>

  <div class="metrics-container">
    <div class="huge-number">183</div>
    <div class="number-label">张有效足迹照片</div>
  </div>

  <div class="fab-container">
    <div class="fab">
      <span class="fab-text">查看足迹地图</span>
      <div class="fab-arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </div>
    </div>
  </div>
</body>

</html>
