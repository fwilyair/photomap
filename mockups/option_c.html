<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=393, height=852, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 393px;
            height: 852px;
            background-color: #0f1115;
            /* Deep dark slate */
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Topo Lines Background */
        .topo-bg {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background-image: repeating-radial-gradient(circle at 0 0,
                    transparent 0,
                    #0f1115 10px,
                    rgba(255, 136, 0, 0.05) 11px,
                    transparent 12px);
            opacity: 0.6;
            z-index: 0;
        }

        /* Grid overlay */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1;
        }

        /* Status Bar */
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 54px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            font-size: 15px;
            font-weight: 600;
            z-index: 100;
            color: white;
        }

        .dynamic-island {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 35px;
            background: black;
            border-radius: 20px;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 80px 24px 40px 24px;
        }

        /* Header */
        .header {
            margin-bottom: 40px;
        }

        .system-badge {
            background: rgba(255, 136, 0, 0.15);
            color: #ff8800;
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255, 136, 0, 0.3);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            display: inline-block;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #ffffff;
            margin-bottom: 8px;
        }

        /* Dashboard Cards */
        .dashboard {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: rgba(20, 23, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: #ff8800;
        }

        .metric-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .huge-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 64px;
            font-weight: 800;
            color: #ff8800;
            text-shadow: 0 0 20px rgba(255, 136, 0, 0.4);
            line-height: 1;
        }

        /* Tactical Button */
        .tactical-btn {
            width: 100%;
            height: 60px;
            background: #ff8800;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #000000;
            box-shadow: 0 10px 20px rgba(255, 136, 0, 0.3), inset 0 2px 0 rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        .btn-icon {
            margin-right: 12px;
        }
    </style>
</head>

<body>
    <div class="topo-bg"></div>
    <div class="grid-bg"></div>

    <div class="status-bar">
        <span>16:50</span>
        <div class="dynamic-island"></div>
        <span style="font-size: 13px;">􀙡 􀙇 􀛨</span>
    </div>

    <div class="container">
        <div class="header">
            <div class="system-badge">SYS.TRACK.ACTIVE</div>
            <div class="title">足迹地图</div>
        </div>

        <div class="dashboard">
            <div class="card">
                <div class="metric-label">有效足迹照片</div>
                <div class="huge-number">183</div>
            </div>

            <div class="card" style="opacity: 0.6;">
                <div class="metric-label">Status</div>
                <div style="font-family: 'JetBrains Mono'; font-size: 20px; margin-top: 8px;">同步完成</div>
            </div>
        </div>

        <div class="tactical-btn">
            <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="square">
                <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21" />
            </svg>
            查看足迹地图
        </div>
    </div>
</body>

</html>
